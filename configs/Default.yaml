# Default robot configuration for the LEGO SPIKE inverted pendulum starter.
#
# This file is loaded by LegoBalance.RobotConfig.LoadConfig.
# Override values by copying this file to configs/local.yaml and editing the copy,
# or by passing a path to LoadConfig directly.
#
# Units:
#   length        meters
#   mass          kilograms
#   angle         radians (unless explicitly noted)
#   angular rate  radians per second
#   time          seconds

robot:
  name: "LegoBalance Mk2"
  description: "Two wheel self balancing inverted pendulum on LEGO SPIKE Prime."

# Geometry of the chassis. Update these for your specific build.
chassis:
  wheelRadius: 0.0285         # measured wheel radius
  # wheelRadius: 0.0425         # measured wheel radius
  wheelBase: 0.1275             # distance between left and right wheel contact points
  bodyMass: 0.409               # rough estimate, will be measured later
  # bodyHeightCoM: 0.1135         # height of the center of mass above the wheel axle
  bodyHeightCoM: 0.075        # height of the center of mass above the wheel axle
  bodyInertia: 0.000637        # pitch inertia of the body about the body center of mass
  bodyLength: 0.055             # fore-aft body length; only used for the box inertia fallback
  bodyHeight: 0.1275             # vertical body height; only used for the box inertia fallback

# Motor and encoder limits.
motors:
  leftPort: "B"               # SPIKE port labels are letters A through F
  rightPort: "F"
  rightAuxPort: "D"           # second right-side motor on the same axle; set "" to disable
  maxAngularRate: 17.4532925199  # rad/s soft cap; 1000 deg/s validated on hub
  maxDuty: 90                 # 0..100 percent duty cap as a safety ceiling
  encoderCountsPerRev: 360    # SPIKE motors report degrees, see Units module
  forwardSign: -1             # hardware verified final flip: positive phi is forward
  leftEncoderSign: 1          # flip to -1 if left encoder counts backward when rolling forward
  rightEncoderSign: -1        # right motor is mirrored on the current build
  rightAuxEncoderSign: -1     # D-port axle assist motor follows the same forward convention as F

# IMU expectations. Verify these against your physical mounting.
imu:
  tiltAxis: "roll"           # which IMU axis tracks body tilt
  tiltSign: 1                 # +1 or -1 to flip sign convention if needed
  zeroOffset: -1.5960163345   # radians, calibrated zero (-91.445 deg)
  # zeroOffset: -1.6231562044   # radians, calibrated zero (-93.0 deg)
  # zeroOffset: 0.0   # radians, calibrated zero (-93.0 deg)
  # zeroOffset: -1.0471975512   # radians, calibrated zero (-60 deg)
  # zeroOffset: -0.872665   # radians, calibrated zero (-50 deg)
  # zeroOffset: -0.785398   # radians, calibrated zero (-45 deg)
  # zeroOffset: -0.698131701   # radians, calibrated zero (-40 deg)
  # zeroOffset: -0.7801621756   # radians, calibrated zero (-44.7 deg)
  zeroOffset: -0.025220008 # radians, calibrated zero (-1.445 deg)
  gyroBias: 0.0               # rad/s, calibrated bias

# Estimator parameters.
estimator:
  filterType: "complementary"
  alpha: 0.98                 # gyro weight in complementary filter, 0..1
  loopRate: 100.0             # Hz, target estimator update rate

# Control loop limits and safety.
control:
  loopRate: 100.0             # Hz, target outer control loop rate
  maxTilt: 2.0                # rad, |tilt| above which the safety monitor trips
  maxTiltRate: 10.0           # rad/s
  maxWheelRate: 17.44  # rad/s commanded; 1000 deg/s validated on hub
  # maxWheelRate: 12.0  # rad/s commanded; 1000 deg/s validated on hub
  watchdogTimeout: 0.2        # s without an update before the safety monitor trips
  # targetTilt: -0.0675        # rad, default upright reference for the balance controller
  targetTilt: -0.04      # rad, default upright reference for the balance controller


# Balancing controller tuning.
#
# controller.algorithm:
#   pid         : discrete PID law modeled on the referenced LEGO example
#   tanh        : alias kept so older configs keep loading; resolves to the
#                 geometry aware nonlinear controller below
#   nonlinear   : geometry aware robust nonlinear controller (active)
#
# Nonlinear law (summary, see docs/NonLinearControllerDesignGuide.md):
#   outer loop: thetaRef = targetTilt - sat(kOuterP*p + kOuterD*pDot, offsetMax)
#   inner loop: aNom = ((alphaHat + lambda)*sin(e) + kD*eDot)/betaHat
#               aRobust = (kRobust/betaHat)*tanh((eDot + cSurface*sin(e)) / eps)
#               aDes = aNom + aRobust
#   mapping  : u = phiDot + (tau/r)*aDes
#
# Where alphaHat and betaHat are computed from chassis geometry. The robust
# term is the only nonlinearity that soaks up model mismatch.
#
# The signs are adapted to this repo's convention:
#   positive tilt -> body leans forward
#   positive command -> wheels drive forward
#
# targetTilt (under 'control' section): balance-point reference.
#   If the robot walks forward, make targetTilt more negative (lean back).
#   If the robot walks backward, make targetTilt more positive (lean forward).
controller:
  algorithm: "nonlinear"            # pid | tanh | nonlinear
  gravityCompGain: 0.5        # preserved for backward compat; unused by balance controllers
  # ----- Legacy tanh composite variable knobs (unused by the new law) -----
  kTheta: 250.0               # legacy tanh gain; unused by the new controller
  kThetaDot: 25.0             # legacy tanh gain; unused by the new controller
  kPhi: 0.0                   # legacy tanh gain; unused by the new controller
  kPhiDot: 0.0                # legacy tanh gain; unused by the new controller
  sScale: 20.0                # legacy tanh gain; unused by the new controller
  thetaDeadband: 0.0          # legacy tanh deadband; unused by the new controller
  thetaDotDeadband: 0.0       # legacy tanh deadband; unused by the new controller
  # ----- Shared fields used by the new NonLinearController -----
  actuatorTau: 0.25           # effective wheel-speed time constant from Port F sweep
  thetaDotFilterAlpha: 0.0    # IIR smoothing on measured tilt rate (0.0 = passthrough)
  # ----- Geometry aware robust nonlinear controller tuning -----
  innerNaturalFrequency: 6.0  # rad/s, nominal small-signal natural frequency
  innerDampingRatio: 1.0      # dimensionless, nominal small-signal damping ratio
  surfaceGain: 3.0            # 1/s, contribution of sin(e) to the sliding variable
  robustGain: 2.0             # rad/s^2, magnitude of the smooth robust correction
  boundaryLayerWidth: 0.5     # tanh boundary layer width on the surface variable
  outerPositionGain: 0.0      # rad/m, slow recentering gain on linear position p
  outerVelocityGain: 0.0      # rad/(m/s), slow recentering gain on linear velocity pDot
  maxReferenceTiltOffset: 0.1 # rad, cap on how far the outer loop may lean the reference
  # ----- PID baseline controller -----
  pidKp: 200.0                 # proportional gain from the referenced example
  pidKi: 5.0                  # integral gain from the referenced example
  pidKd: 80.0                 # derivative gain from the referenced example
  pidKs: -0.6                 # wheel-position correction gain from the example
  pidIntegralStep: 0.25       # discrete integral increment scale from the example
  pidIntegralLimit: 50.0      # anti-windup clamp on the integral state
  pidPositionTargetDeg: 0.0   # target wheel position used by the start term

# Pre balancing drive command path. Used by DriveCommandController and the
# forward/backward/stop smoke flows. These mirror the values validated on
# the real hub. This is for bench tests with the wheels lifted, not for
# autonomous motion.
drive:
  loopPeriodMs: 20            # hub loop period for the package drive smoke test
  printEveryN: 1              # emit one telemetry row every N control iterations
  stopDurationMs: 50          # stop leg duration in the smoke schedule
  driveDurationMs: 5000       # forward/backward leg duration in the smoke schedule
  testSpeed: 17.44 #1.74532925199    # rad/s, 100 deg/s forward/backward smoke command
  maxTiltForMotion: 0.8726646259971648  # rad, 50 deg drive gate validated on hub

# Logging.
logging:
  enabled: true
  level: "info"               # debug, info, warn, error
  bufferSize: 2048            # number of samples held in memory before flushing
