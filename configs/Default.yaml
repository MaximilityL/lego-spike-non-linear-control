# Default robot configuration for the LEGO SPIKE inverted pendulum starter.
#
# This file is loaded by LegoBalance.RobotConfig.LoadConfig.
# Override values by copying this file to configs/local.yaml and editing the copy,
# or by passing a path to LoadConfig directly.
#
# Units:
#   length        meters
#   mass          kilograms
#   angle         radians (unless explicitly noted)
#   angular rate  radians per second
#   time          seconds

robot:
  name: "LegoBalance Mk1"
  description: "Two wheel self balancing inverted pendulum on LEGO SPIKE Prime."

# Geometry of the chassis. Update these for your specific build.
chassis:
  wheelRadius: 0.0285         # measured wheel radius
  # wheelRadius: 0.0425         # measured wheel radius
  wheelBase: 0.11             # distance between left and right wheel contact points
  bodyMass: 0.276               # rough estimate, will be measured later
  # bodyHeightCoM: 0.1135         # height of the center of mass above the wheel axle
  bodyHeightCoM: 0.105        # height of the center of mass above the wheel axle
  bodyInertia: 0.00337          # rotational inertia of the body around the wheel axle

# Motor and encoder limits.
motors:
  leftPort: "B"               # SPIKE port labels are letters A through F
  rightPort: "F"
  maxAngularRate: 17.4532925199  # rad/s soft cap; 1000 deg/s validated on hub
  maxDuty: 90                 # 0..100 percent duty cap as a safety ceiling
  encoderCountsPerRev: 360    # SPIKE motors report degrees, see Units module
  forwardSign: -1             # hardware verified final flip: positive phi is forward
  leftEncoderSign: 1          # flip to -1 if left encoder counts backward when rolling forward
  rightEncoderSign: -1        # right motor is mirrored on the current build

# IMU expectations. Verify these against your physical mounting.
imu:
  tiltAxis: "roll"           # which IMU axis tracks body tilt
  tiltSign: 1                 # +1 or -1 to flip sign convention if needed
  zeroOffset: -1.5960163345   # radians, calibrated zero (-91.445 deg)
  # zeroOffset: -1.6231562044   # radians, calibrated zero (-93.0 deg)
  # zeroOffset: 0.0   # radians, calibrated zero (-93.0 deg)
  # zeroOffset: -1.0471975512   # radians, calibrated zero (-60 deg)
  # zeroOffset: -0.872665   # radians, calibrated zero (-50 deg)
  # zeroOffset: -0.785398   # radians, calibrated zero (-45 deg)
  # zeroOffset: -0.698131701   # radians, calibrated zero (-40 deg)
  # zeroOffset: -0.7801621756   # radians, calibrated zero (-44.7 deg)
  gyroBias: 0.0               # rad/s, calibrated bias

# Estimator parameters.
estimator:
  filterType: "complementary"
  alpha: 0.98                 # gyro weight in complementary filter, 0..1
  loopRate: 100.0             # Hz, target estimator update rate

# Control loop limits and safety.
control:
  loopRate: 100.0             # Hz, target outer control loop rate
  maxTilt: 2.0                # rad, |tilt| above which the safety monitor trips
  maxTiltRate: 10.0           # rad/s
  maxWheelRate: 17.44  # rad/s commanded; 1000 deg/s validated on hub
  # maxWheelRate: 12.0  # rad/s commanded; 1000 deg/s validated on hub
  watchdogTimeout: 0.2        # s without an update before the safety monitor trips
  targetTilt: -0.019        # rad, default upright reference for the balance controller


# Nonlinear balancing controller tuning (tanh composite-variable law).
#
# Control law (velocity command, rad/s):
#   s = kTheta*deadband(theta) + kThetaDot*deadband(thetaDot)
#       - kPhi*phi - kPhiDot*phiDot
#   u = maxWheelRate * tanh(s / sScale)          [smooth bounded output]
#   u = clamp(u, -maxWheelRate, +maxWheelRate)   [hard backstop]
#
# Near upright the law is approximately linear with effective gains:
#   kTheta_eff    = maxWheelRate * kTheta    / sScale   [rad/s per rad]
#   kThetaDot_eff = maxWheelRate * kThetaDot / sScale   [rad/s per rad/s]
#
# With current defaults (maxWheelRate=17.44, kTheta=60, kThetaDot=8, sScale=18):
#   kTheta_eff    ~ 58.1  rad/s per rad
#   kThetaDot_eff ~ 7.8   (rad/s)/(rad/s)   ← close to critical damping (~7.6)
#
# thetaDotFilterAlpha: first-order IIR low-pass on thetaDot (0.0 = off).
#   Use 0.2 to cut high-frequency gyro noise. DO NOT exceed 0.3 — heavier
#   filtering adds phase lag at the control frequency and worsens oscillation.
#
# targetTilt (under 'control' section): adjust to fix persistent phi drift.
#   If the robot walks forward, make targetTilt more negative (lean back).
#   If the robot walks backward, make targetTilt more positive (lean forward).
controller:
  gravityCompGain: 0.5        # preserved for backward compat; not used by tanh controller
  kTheta: 75.0                # dominant tilt gain (rad/s per rad)
  kThetaDot: 4.5              # tilt-rate damping gain; keep this modest on noisy gyro data
  kPhi: 0.04                  # weak wheel-position centering gain (rad/s per rad)
  kPhiDot: 0.35               # weak wheel-rate damping gain (dimensionless)
  sScale: 14.0                # composite-variable normalisation scale; controls tanh knee
  thetaDotFilterAlpha: 0.30    # IIR filter coeff (0.0=off, 0.2=light noise filter, max 0.3)
  thetaDeadband: 0.02094395     # rad, ±1.2 deg tilt noise suppression near upright
  thetaDotDeadband: 0.61086524   # rad/s, ±35 deg/s tilt-rate noise suppression

# Pre balancing drive command path. Used by DriveCommandController and the
# forward/backward/stop smoke flows. These mirror the values validated on
# the real hub. This is for bench tests with the wheels lifted, not for
# autonomous motion.
drive:
  loopPeriodMs: 20            # hub loop period for the package drive smoke test
  printEveryN: 20              # emit one telemetry row every N control iterations
  stopDurationMs: 50          # stop leg duration in the smoke schedule
  driveDurationMs: 5000       # forward/backward leg duration in the smoke schedule
  testSpeed: 17.44 #1.74532925199    # rad/s, 100 deg/s forward/backward smoke command
  maxTiltForMotion: 0.8726646259971648  # rad, 50 deg drive gate validated on hub

# Logging.
logging:
  enabled: true
  level: "info"               # debug, info, warn, error
  bufferSize: 2048            # number of samples held in memory before flushing
